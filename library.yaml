default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: atlassian-toolkit
      description: Self-contained CLI toolkit for Atlassian Cloud (Jira, Bitbucket, Confluence) via API token — no MCP, no npm install. Shared dependency for the bug, PR, and retro agents; other skills shell out to its bins through $ATLASSIAN_BIN_DIR. Infrastructure, not a task the model performs directly; requires ATLASSIAN_BIN_DIR + ATLASSIAN_EMAIL/ATLASSIAN_API_TOKEN set in the shell rc.
      source: https://github.com/J-HernandezInzunza/my-engineering-library/blob/master/skills/atlassian-toolkit/SKILL.md
    - name: bug-investigator
      description: Investigate sparse Jira bug tickets and enrich them with a grounded root-cause theory. Fetch the ticket, trace code across repos (starting from any linked PRs the triager found), form a falsifiable theory, and append to Dev Notes or return a draft. Triggers on "investigate this", "look at this bug", "trace down this bug", or pasting a Jira bug key/URL.
      source: https://github.com/J-HernandezInzunza/my-engineering-library/blob/master/skills/bug-investigator/SKILL.md
      requires: ["skill:atlassian-toolkit"]
    - name: bug-triager
      description: Triage a Jira bug by searching Jira for related, duplicate, or previously-fixed tickets before code investigation. Ranks matches, captures their linked pull requests, optionally posts a related-tickets comment, and hands off to bug-investigator. Triggers on "triage this", "has this been reported", "find related tickets", "check for duplicates".
      source: https://github.com/J-HernandezInzunza/my-engineering-library/blob/master/skills/bug-triager/SKILL.md
      requires: ["skill:atlassian-toolkit"]
    - name: commit-push
      description: Write a semantic commit message from staged changes, commit, and push to the remote. Enforces Jose's preferred commit style (semantic prefix, bulleted changes with filenames only, closing summary paragraph). Use whenever the user says "commit and push", "ship this", "write a commit message", "commit my changes", or otherwise wants staged work turned into a well-formatted commit. Also use when the user has staged changes and asks you to wrap up or finalize the work.
      source: https://github.com/J-HernandezInzunza/my-engineering-library/blob/master/skills/commit-push/SKILL.md
    - name: explain-code
      description: Walks through code to build the user's mental model — useful for onboarding to legacy code, understanding unfamiliar files, or grokking complex logic before changing it. Language-agnostic; works on frontend (Vue, TypeScript, JavaScript) and backend (Java, Spring Boot, Python, etc.). Use this skill whenever the user asks to explain, walk through, break down, or understand a piece of code, including phrases like "how does this work", "what is this doing", "walk me through this function", "explain this file", "help me understand this", or "break this down". This is a teaching skill — explanations are structured to build understanding and invite deeper thinking, not just to answer the surface question. Do NOT use this skill for adding inline documentation (TSDoc/JSDoc/Javadoc) — that's a separate skill.
      source: https://github.com/J-HernandezInzunza/my-engineering-library/blob/master/skills/explain-code/SKILL.md
  agents: []
  prompts:
    - name: triage-bug
      description: Interactive bug-triage → investigation workflow as a pi prompt template. Invoke as `/triage-bug <TICKET-KEY>`. Asks before any Jira write. Enforces strict triage→investigate handoff via triage-context.json. Headless counterpart lives at my-engineering-library/workflows/bug-triage/.
      source: https://github.com/J-HernandezInzunza/my-engineering-library/blob/master/prompts/triage-bug.md
      requires: ["skill:bug-investigator", "skill:bug-triager"]
